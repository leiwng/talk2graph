<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>talk2graph - 用自然语言画数学图形</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
  background: #f4f6f8;
  color: #1f2937;
  display: flex;
  height: 100vh;
  overflow: hidden;
}
#chat-panel {
  width: 420px;
  min-width: 340px;
  background: #fff;
  border-right: 1px solid #d8dee8;
  display: flex;
  flex-direction: column;
}
#chat-header {
  padding: 16px 20px;
  border-bottom: 1px solid #e5e7eb;
  font-size: 18px;
  font-weight: 700;
  display: flex;
  align-items: center;
  gap: 8px;
}
#chat-header .logo { font-size: 24px; }
#chat-history {
  flex: 1;
  overflow-y: auto;
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}
.msg {
  max-width: 92%;
  padding: 10px 14px;
  border-radius: 12px;
  font-size: 14px;
  line-height: 1.6;
}
.msg.user {
  background: #0f766e;
  color: #fff;
  align-self: flex-end;
  border-bottom-right-radius: 4px;
}
.msg.assistant {
  background: #eef2f7;
  color: #111827;
  align-self: flex-start;
  border-bottom-left-radius: 4px;
}
#chat-input-area {
  padding: 12px 16px;
  border-top: 1px solid #e5e7eb;
  display: flex;
  gap: 8px;
}
#chat-input {
  flex: 1;
  padding: 10px 14px;
  border: 1px solid #cbd5e1;
  border-radius: 20px;
  font-size: 14px;
  outline: none;
  font-family: inherit;
}
#chat-input:focus { border-color: #0f766e; }
#send-btn {
  padding: 10px 20px;
  background: #0f766e;
  color: #fff;
  border: none;
  border-radius: 20px;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
}
#send-btn:disabled {
  background: #94a3b8;
  cursor: not-allowed;
}
#error-banner {
  display: none;
  padding: 10px 16px;
  background: #fff7ed;
  color: #9a3412;
  font-size: 13px;
  border-top: 1px solid #fed7aa;
}
.example-prompts {
  padding: 12px 16px 0;
  border-top: 1px solid #e5e7eb;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
}
.example-prompts button {
  min-height: 34px;
  padding: 7px 9px;
  border: 1px solid #cbd5e1;
  border-radius: 7px;
  background: #fff;
  color: #334155;
  font-size: 12px;
  line-height: 1.35;
  text-align: left;
  cursor: pointer;
}
.example-prompts button:hover {
  border-color: #0f766e;
  background: #f0fdfa;
  color: #0f766e;
}
#preview-panel {
  flex: 1;
  min-width: 0;
  display: flex;
  flex-direction: column;
  background: #f8fafc;
}
#preview-header {
  padding: 12px 20px;
  font-size: 13px;
  color: #64748b;
  display: flex;
  justify-content: space-between;
  align-items: center;
  border-bottom: 1px solid #e5e7eb;
}
#preview-header .actions {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}
#preview-header .actions button {
  font-size: 12px;
  padding: 5px 12px;
  border: 1px solid #cbd5e1;
  border-radius: 6px;
  background: #fff;
  cursor: pointer;
  color: #1f2937;
}
#preview-header .actions button:hover { background: #eef2f7; }
#preview-header .actions button:disabled {
  color: #94a3b8;
  background: #f8fafc;
  cursor: not-allowed;
}
#preview-canvas {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
  overflow: auto;
}
#preview-canvas img {
  max-width: 100%;
  max-height: 100%;
  object-fit: contain;
}
#preview-placeholder,
#loading-indicator {
  color: #94a3b8;
  font-size: 16px;
  text-align: center;
}
#preview-placeholder .icon { font-size: 48px; margin-bottom: 12px; }
#loading-indicator { display: none; }
#loading-indicator .spinner {
  display: inline-block;
  width: 20px;
  height: 20px;
  border: 2px solid #dbe3ee;
  border-top-color: #0f766e;
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin-right: 8px;
  vertical-align: middle;
}
@keyframes spin { to { transform: rotate(360deg); } }
@media (max-width: 820px) {
  body {
    flex-direction: column;
    min-height: 100dvh;
    height: auto;
    overflow: auto;
  }
  #chat-panel {
    width: 100%;
    min-width: 0;
    min-height: 48dvh;
    max-height: 56dvh;
    border-right: 0;
    border-bottom: 1px solid #d8dee8;
  }
  #chat-header { padding: 12px 16px; }
  #chat-history { padding: 12px; }
  .example-prompts {
    grid-template-columns: 1fr;
    max-height: 104px;
    overflow-y: auto;
    padding: 10px 12px 0;
  }
  #chat-input-area {
    position: sticky;
    bottom: 0;
    background: #fff;
    padding: 10px 12px;
  }
  #preview-panel { min-height: 44dvh; }
  #preview-header {
    align-items: flex-start;
    flex-direction: column;
    gap: 8px;
    padding: 10px 12px;
  }
  #preview-header .actions {
    width: 100%;
  }
  #preview-header .actions button {
    flex: 1;
    min-width: 88px;
  }
  #preview-canvas {
    min-height: 280px;
    padding: 12px;
  }
}
</style>
</head>
<body>
<div id="chat-panel">
  <div id="chat-header">
    <span class="logo">📐</span> talk2graph
  </div>
  <div id="chat-history">
    <div class="msg assistant">
      告诉我你想画什么样的数学图形<br>
      试试：<b>画一个直角三角形，两条直角边分别是 3 和 4，标出边长</b>
    </div>
  </div>
  <div id="error-banner"></div>
  <div class="example-prompts" aria-label="示例图形">
    <button type="button" data-prompt="画一个直角三角形，两条直角边分别是 3 和 4，标出边长">直角三角形</button>
    <button type="button" data-prompt="画一个等边三角形，边长 5cm">等边三角形</button>
    <button type="button" data-prompt="画一个正方形，边长 4cm">正方形</button>
    <button type="button" data-prompt="画一个圆，半径 3cm，标注圆心">圆心半径</button>
    <button type="button" data-prompt="画一个等腰三角形，底边长 6cm，腰长 5cm">底腰等腰</button>
    <button type="button" data-prompt="画直角三角形的内切圆，直角边分别为 3 和 4，标出内切圆圆心和半径">直角内切圆</button>
    <button type="button" data-prompt="画 y = sin(x) 和 y = cos(x) 在 -2π 到 2π 的图像，用不同颜色区分">正弦/余弦</button>
    <button type="button" data-prompt="画 y = 2x + 1 的图像，在 -5 到 5 范围内">一次函数</button>
    <button type="button" data-prompt="画 y = x² 的图像，在 -3 到 3 范围内">二次函数</button>
    <button type="button" data-prompt="画 y = sin(x) 的图像，在 -2π 到 2π 范围内">正弦函数</button>
    <button type="button" data-prompt="画参数方程绘制的椭圆：x=3cos(t), y=2sin(t)，t 从 0 到 2π">参数椭圆</button>
    <button type="button" data-prompt="画一个圆，内接一个正六边形，标注圆心">圆内接六边形</button>
    <button type="button" data-prompt="画一个底角 30° 的等腰三角形，腰长 5cm">等腰三角形</button>
    <button type="button" data-prompt="画一个内切圆半径为 3 的等腰三角形">内切圆等腰三角形</button>
    <button type="button" data-prompt="画 y = x² 和 y = 2x + 1 的交点区域，用阴影标出来">交点阴影</button>
    <button type="button" data-prompt="画一个长方体，被一个平面截成斜截面，标出截面">长方体截面</button>
    <button type="button" data-prompt="画一个班级成绩条形统计图，数据为优秀10人，良好18人，及格8人，待提高4人">条形统计图</button>
    <button type="button" data-prompt="画一个柱状图：一班 85 分，二班 78 分，三班 92 分，四班 80 分">班级柱状图</button>
    <button type="button" data-requires-graph="true" data-graph-scope="right-triangle" data-prompt="把直角标记从内侧移到外侧">直角标记外侧</button>
    <button type="button" data-requires-graph="true" data-graph-scope="right-triangle" data-prompt="去掉边长的标注，加一条斜边上的高">斜边上的高</button>
    <button type="button" data-requires-graph="true" data-graph-scope="right-triangle" data-prompt="加一条辅助线">加辅助线</button>
    <button type="button" data-requires-graph="true" data-graph-scope="right-triangle" data-prompt="标出∠A">标出角A</button>
    <button type="button" data-requires-graph="true" data-graph-scope="right-triangle" data-prompt="把角B标出来">标出角B</button>
    <button type="button" data-requires-graph="true" data-graph-scope="right-triangle" data-prompt="标出∠C">标出角C</button>
    <button type="button" data-requires-graph="true" data-graph-scope="right-triangle" data-prompt="把辅助线改成虚线">辅助线虚线</button>
    <button type="button" data-requires-graph="true" data-graph-scope="plot" data-prompt="把坐标系的范围改成 -5 到 5">范围 -5 到 5</button>
  </div>
  <div id="chat-input-area">
    <input id="chat-input" type="text" placeholder="描述你要画的图形或修改要求...">
    <button id="send-btn" type="button">发送</button>
  </div>
</div>

<div id="preview-panel">
  <div id="preview-header">
    <span>图形预览</span>
    <div class="actions">
      <button id="download-svg-btn" type="button">下载 SVG</button>
      <button id="download-tikz-btn" type="button">下载 TikZ</button>
      <button id="undo-btn" type="button">撤销</button>
    </div>
  </div>
  <div id="preview-canvas">
    <div id="preview-placeholder">
      <div class="icon">📐</div>
      在左侧描述你要画的图形
    </div>
    <div id="loading-indicator">
      <span class="spinner"></span>正在生成图形...
    </div>
  </div>
</div>

<script src="./src/graph-engine.js"></script>
<script src="./src/browser-app.js"></script>
</body>
</html>
